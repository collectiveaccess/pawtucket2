		},	
		medium_facet = {
			type = attribute,
			element_code = medium,
			
			group_mode = alphabetical,
			order_by_label_fields = [name_sort],
			suppress = [null],
			label_singular = _("Medium"),
			label_plural = _("Medium"),
			description = _("Find objects by Medium."),	
