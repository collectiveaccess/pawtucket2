# Configuration for object browse
ca_objects = {
	name = _("Objects"),
	facets = {
		artist_facet = {
			# 'type' can equal authority, attribute, fieldList, normalizedDates
			type = authority,		
			table = ca_entities,
			relationship_table = ca_objects_x_entities,
			restrict_to_relationship_types = [artist],
			
			individual_group_display = 1,
			
			groupings = {
				label = _("Name"), 
				relationship_types = _("Role"),
				type = _("Type")
			},
			group_mode = alphabetical,
			natural_sort = 0,
			order_by_label_fields = [surname, forename, middlename],
			
			indefinite_article = an,
			label_singular = _("artist"),
			label_plural = _("artists"),
		},	
		artwork_type_facet = {
			type = attribute,
			element_code = artwork_type,
			
			group_mode = none,
			order_by_label_fields = [name_sort],
			suppress = [null],
			label_singular = _("Artwork Type"),
			label_plural = _("Artwork Types"),
		},	
		artwork_category_facet = {
			type = attribute,
			element_code = artwork_category,
			
			group_mode = none,
			order_by_label_fields = [name_sort],
			suppress = [null],
			label_singular = _("Tag"),
			label_plural = _("Tags"),
		},
		on_display_facet = {
			type = attribute,
			element_code = on_display,
			group_mode = none,
			order_by_label_fields = [name_sort],
			suppress = [null],
			label_singular = _("On Display?"),
			label_plural = _("On Display?"),
			hide = 1
		},
		place_category_facet = {
			type = attribute,
			element_code = place_category,
			relative_to = ca_places,
			group_mode = none,
			order_by_label_fields = [name_sort],
			suppress = [null],
			label_singular = _("Location Category"),
			label_plural = _("Location Categories"),
		},
		place_council_district = {
			type = attribute,
			element_code = council_district,
			relative_to = ca_places,
			group_mode = none,
			order_by_label_fields = [name_sort],
			suppress = [null],
			label_singular = _("Council District"),
			label_plural = _("Council Districts"),
		},
		place_facet = {
			# 'type' can equal authority, attribute, fieldList, normalizedDates
			type = authority,		
			table = ca_places,
			relationship_table = ca_objects_x_places,
			restrict_to_types = [],
			
			individual_group_display = 1,
			
			group_mode = alphabetical,
			natural_sort = 0,
			order_by_label_fields = [name],
			
			# Set to non-zero value to display hierarchy on items in this facet
			show_hierarchy = 1,
			
			# Character(s) to place between elements of the hierarchy
			hierarchical_delimiter = &nbsp;⬅&nbsp;,
			
			# Number of items to trim off the top (leave blank or set to 0 to trim nothing)
			remove_first_items = 0,
			
			# Maximum length of hierarchy to display (leave blank to return hierarchy unabridged)
			hierarchy_limit = 3,
			
			# can be ASC or DESC (default is DESC)
			hierarchy_order  = DESC,
			
			indefinite_article = a,
			label_singular = _("Location"),
			label_plural = _("Locations"),
			description = _("Find objects according to the place relationships in your collection.  You can choose to view the available places as a list or hierarchy of place names.")
		}


	}
}
