

# Allow download of representation on object detail page?
# accepted values include: anyone, logged_in, logged_in_privileged
allow_ca_objects_representation_download = 


#
# Details supported in this theme
#
detailTypes = {
	artworks = {
		displayName = _(Objects),
		table = ca_objects,
		restrictToTypes = [],
		options = {
			# Next/previous/back navigation in detail
			nextLink = Next <i class='bi bi-chevron-right'></i>,
			previousLink = <i class='bi bi-chevron-left'></i> Previous,
			resultsLink = <i class='bi bi-chevron-left'></i> Back,
			detailNavLinkClass = btn btn-sm btn-white ps-3 pe-0 fw-medium,
			
			# Next/previous navigation in media viewer overlay
			showRepresentationViewerNextPreviousLinks = 1,
			representationViewerNextLink = ^ca_objects.preferred_labels%truncate=20&ellipsis=1 <ifdef code='ca_objects.idno'>(^ca_objects.idno)</ifdef> <i class='fa fa-angle-right'></i>,
			representationViewerPreviousLink = <i class='fa fa-angle-left'></i> ^ca_objects.preferred_labels%truncate=20&ellipsis=1 <ifdef code='ca_objects.idno'>(^ca_objects.idno)</ifdef>,
			
			#
			# Detail page utilities
			#
			enableComments = 0,
			enablePDF = 0,
			enableInquire = 1,
			enableCopyLink = 1,
			
			# Enable tagging
			enableTags = 1,
			
			# Use list for tags; if set checklist tagging interface is used rather than traditional text-entry interface
			tagList = public_tags,
			
			#
			# Media viewer
			# 
			mediaCaptionTemplate = <if rule='^ca_object_representations.preferred_labels.name !~ /BLANK/'><div class='small text-center'>^ca_object_representations.preferred_labels.name</div></if>,
			#showOnlyMediaTypes = [audio, video],
			
			#
			# Media download
			#
			allowMediaDownload = 0,
			requireLoginForMediaDownload = 0,
			requireRoleForMediaDownload = [],
			
			#
			# Maps
			#
			mapAttributes = [ca_objects.georeference],
			mapZoomLevel = 15,
			mapMinZoomLevel = 1,
			mapMaxZoomLevel = 18,
			mapItemInfoTemplate = "^ca_places.preferred_labels<ifdef code='ca_places.address'><br/><ifdef code='ca_places.address.address1'>^ca_places.address.address1</ifdef><ifdef code='ca_places.address.address2'><ifdef code='ca_places.address.address1'><br/></ifdef>^ca_places.address.address2</ifdef><ifdef code='ca_places.address.city|ca_places.address.state|ca_places.address.zip|ca_places.address.country'><ifdef code='ca_places.address.address1|ca_places.address.address2'><br/></ifdef><ifdef code='ca_places.address.city'>^ca_places.address.city</ifdef><ifdef code='ca_places.address.state'><ifdef code='ca_places.address.city'>, </ifdef>^ca_places.address.state</ifdef><ifdef code='ca_places.address.zip'> ^ca_places.address.zip</ifdef><ifdef code='ca_places.address.country'> ^ca_places.address.country</ifdef></ifdef>",
			
			# Customize export download file names; can be set to a display template or static text
			pdfExportTitle = ^ca_objects.preferred_labels.name,
		},
		# --- aliases to this detail page - these map to browses that return this type of detail, only need to be defined if the key of this array differs from the browses that find this record type
		#aliases = []
	},
	entities = {
		displayName = _(People),
		table = ca_entities,
		restrictToTypes = [],
		options = {
			nextLink = Next <i class='bi bi-chevron-right'></i>,
			previousLink = <i class='bi bi-chevron-left'></i> Previous,
			resultsLink = <i class='bi bi-chevron-left'></i> Back,
			detailNavLinkClass = btn btn-sm btn-white ps-3 pe-0 fw-medium,
			
			enableComments = 0,
			enablePDF = 0,
			enableInquire = 0,
			enableCopyLink = 0,
		}
	},
	exhibitions = {
		displayName = _(Exhibitions),
		table = ca_occurrences,
		restrictToTypes = [],
		options = {
			nextLink = Next <i class='bi bi-chevron-right'></i>,
			previousLink = <i class='bi bi-chevron-left'></i> Previous,
			resultsLink = <i class='bi bi-chevron-left'></i> Back,
			detailNavLinkClass = btn btn-sm btn-white ps-3 pe-0 fw-medium,
			
			enableComments = 0,
			enablePDF = 0,
			enableInquire = 1,
			enableCopyLink = 1,
			
			#
			# Media viewer
			# 
			mediaCaptionTemplate = <if rule='^ca_object_representations.preferred_labels.name !~ /BLANK/'><div class='small text-center'>^ca_object_representations.preferred_labels.name</div></if>,
			
			#
			# Media download
			#
			allowMediaDownload = 0,
			requireLoginForMediaDownload = 0,
			requireRoleForMediaDownload = [],
			#
			# Maps
			#
			mapAttributes = [ca_places.georeference],
			mapZoomLevel = 15,
			mapMinZoomLevel = 1,
			mapMaxZoomLevel = 18,
			mapItemInfoTemplate = "^ca_places.preferred_labels<ifdef code='ca_places.address'><br/><ifdef code='ca_places.address.address1'>^ca_places.address.address1</ifdef><ifdef code='ca_places.address.address2'><ifdef code='ca_places.address.address1'><br/></ifdef>^ca_places.address.address2</ifdef><ifdef code='ca_places.address.city|ca_places.address.state|ca_places.address.zip|ca_places.address.country'><ifdef code='ca_places.address.address1|ca_places.address.address2'><br/></ifdef><ifdef code='ca_places.address.city'>^ca_places.address.city</ifdef><ifdef code='ca_places.address.state'><ifdef code='ca_places.address.city'>, </ifdef>^ca_places.address.state</ifdef><ifdef code='ca_places.address.zip'> ^ca_places.address.zip</ifdef><ifdef code='ca_places.address.country'> ^ca_places.address.country</ifdef></ifdef>",
			
		}
	},
	places = {
		displayName = _(Places),
		table = ca_places,
		restrictToTypes = [],
		options = {
			nextLink = Next <i class='bi bi-chevron-right'></i>,
			previousLink = <i class='bi bi-chevron-left'></i> Previous,
			resultsLink = <i class='bi bi-chevron-left'></i> Back,
			detailNavLinkClass = btn btn-sm btn-white ps-3 pe-0 fw-medium,
			
			enableComments = 0,
			enablePDF = 0,
			enableInquire = 0,
			enableCopyLink = 0,			
			
			#
			# Maps
			#
			mapAttributes = [ca_places.georeference],
			
			#mapMinZoomLevel - Minimum zoom level to allow; leave null if you don't want to enforce a limit
			#mapMaxZoomLevel - Maximum zoom level to allow; leave null if you don't want to enforce a limit
	 		#mapZoomLevel (also supports zoom_level) - Zoom map to specified level rather than fitting all markers into view; leave undefined if you don't want to specify a zoom level. IF this option is set minZoomLevel and maxZoomLevel will be ignored.

			mapZoomLevel = 15,
			mapMinZoomLevel = 1,
			mapMaxZoomLevel = 18,
			mapItemInfoTemplate = "<div class='fw-medium fs-5'>^ca_places.preferred_labels.name</div>",

		}
	},
	collections = {
		displayName = _(Collections),
		table = ca_collections,
		restrictToTypes = [],
		options = {
			nextLink = Next <i class='bi bi-chevron-right'></i>,
			previousLink = <i class='bi bi-chevron-left'></i> Previous,
			resultsLink = <i class='bi bi-chevron-left'></i> Back,
			detailNavLinkClass = btn btn-sm btn-white ps-3 pe-0 fw-medium,
			
			enableComments = 0,
			enablePDF = 1,
			enableInquire = 1,
			enableCopyLink = 0,
			
			# --- exported pdf has label of record, leave blank to default to export_results
			pdfExportTitle = label
		}
	},
	annotations = {
		displayName = _(Annotations),
		table = ca_representation_annotations,
		restrictToTypes = [],
		options = {
			nextLink = Next <i class='bi bi-chevron-right'></i>,
			previousLink = <i class='bi bi-chevron-left'></i> Previous,
			resultsLink = <i class='bi bi-chevron-left'></i> Back,
			detailNavLinkClass = btn btn-sm btn-white ps-3 pe-0 fw-medium,
			
			enableComments = 0,
			enablePDF = 0,
			enableInquire = 1,
			enableCopyLink = 0,
		}
	}
