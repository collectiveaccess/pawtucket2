# display name of section and items
gallery_section_name = Tours
gallery_section_item_name = tour
gallery_section_item_name_plural = tours

# Type of set to display in the "gallery" section
# (this set type must exist in your database for this to work)
gallery_set_type = public_presentation

# --- highlight 1 random gallery at top of landing page
#--- 0,1 default = 0
landing_page_dont_show_featured_gallery = 0

# --- label for landing page Featured gallery
landing_page_featured_heading = Featured

# --- image format to show with each gallery on landing page - options are contain, cover -> default cover
landing_page_item_image_format = cover

# --- global value for introduction text (must be configured in app.conf in pawtucket and providence)
landing_page_intro_text_global_value = gallery_intro_text

#gallery_sort_by = FIX / USE THIS: not sure what values this supports, can it default to most recent on top??????


# --- md element of description text to display with sets on landing and detail page
gallery_set_description_element_code = set_description

# --- md element of field with result formats (supported codes: timeline, map, slideshow)
gallery_set_presentation_element_code = set_presentation_type

# --- include sets with any content or only objects
gallery_include_all_tables = 1

omit_front_page_set_from_gallery = 1

#
# View options for gallery content
#
views = {
	map = {
		ca_objects = {
			mapAttributes = [ca_objects.georeference],
			width = 100%,
			height = 600px,
			minZoomLevel = 5,
			maxZoomLevel = 15,
			mapItemInfoTemplate =  "<ifdef code='ca_object_representations.media.widepreview'><div class='img-fluid pb-2'>^ca_object_representations.media.widepreview</div></ifdef><div class='fw-bold fs-5'><l><ifcount code='ca_entities' min='1' restrictToRelationshipTypes='artist'><unit relativeTo='ca_entities' restrictToRelationshipTypes='artist' delimiter=', '>^ca_entities.preferred_labels</unit><br/></ifcount><i>^ca_objects.preferred_labels.name</i></l></div><ifdef code='ca_objects.date_completed|ca_objects.media'><div class='card-text small lh-sm'>^ca_objects.date_completed<ifdef code='ca_objects.date_completed,ca_objects.media'>, </ifdef><ifdef code='ca_objects.date_completed,ca_objects.media'>^ca_objects.media</ifdef></div></ifdef>"
		}	
	},
	slideshow = {
		ca_objects = {
			labelTemplate = "<div class='fs-2 mb-1'><l><ifcount code='ca_entities' min='1' restrictToRelationshipTypes='artist'><unit relativeTo='ca_entities' restrictToRelationshipTypes='artist' delimiter=', '>^ca_entities.preferred_labels</unit><br/></ifcount><i>^ca_objects.preferred_labels.name</i></l></div><ifdef code='ca_objects.date_completed|ca_objects.media'><div class='fs-4'>^ca_objects.date_completed<ifdef code='ca_objects.date_completed,ca_objects.media'>, </ifdef><ifdef code='ca_objects.date_completed,ca_objects.media'>^ca_objects.media</ifdef></div></ifdef>",
			# --- contentTemplate - display template from the record in the set
			contentTemplate = "",
			# --- setItemContentTemplate - display template from the set item so can get set specific cataloging
			setItemContentTemplate = "<if rule='^ca_set_items.preferred_labels !~ /BLANK/'><div class='unit'>^ca_set_items.preferred_labels</div></if>"

		},
		ca_occurrences = {
			labelTemplate = <l aria-label='go to detail page'>^ca_occurrences.preferred_labels.name</l>,
			contentTemplate = "<ifdef code='ca_occurrences.content_description'><div class='unit'>^ca_occurrences.content_description</div></ifdef>",
			setItemContentTemplate = "<if rule='^ca_set_items.preferred_labels !~ /BLANK/'><div class='unit'>^ca_set_items.preferred_labels</div></if>"

		},
		ca_collections = {
			labelTemplate = <l aria-label='go to detail page'>^ca_collections.preferred_labels.name</l>,
			contentTemplate = "<ifdef code='ca_collections.description'><div class='unit'>^ca_collections.description</div></ifdef>",
			setItemContentTemplate = "<if rule='^ca_set_items.preferred_labels !~ /BLANK/'><div class='unit'>^ca_set_items.preferred_labels</div></if>"

		}
	}
			
}
