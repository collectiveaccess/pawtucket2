# Site map urls will be generated using hostname, protocol and url path configured in setup.php
# If setup.php files uses hostname, protocol and url path values set dynamically based upon the incoming
# request then the sitemap may include generic "localhost" urls. 
#
# You can use the site_* directives below to set the url to a desired value regardless of configuration in setup.php
# If omitted then the setup.php established values will be used
#site_protocol = https
#site_hostname = mysite.org
#site_url_root = 

# Show progress bar?
quiet = 0

# Directory to output sitemap files to
sitemap_directory = __CA_BASE_DIR__

# Map contents. Each key is a page type. Types include "Front" (front page), "Gallery" and "Detail". Any other value
# will be considered a static page and added to the map as-is.
#
# The Detail mapping will output urls of all public detail pages for the detail types listed as pages. To automatically
# includes all detail types set the key "*" in the pages list.
map = {
	Front = { 
		pages = {
			Index = {}
		}
	},
	Detail = {
		pages = {
			* = {}
		},
		options = {
			#limit = 50,			# total number page pages to output for a detail type
			#urls_per_file = 10 	# maximum number of urls to include in a single site map; if omitted defaults to 50,000
		}
	},
	Gallery = {
		pages = {
			Index = {}
		}
	},
	About = {
		pages = {
			Contact = {},
			Staff = {}
		}
	},
	Collections = {
		pages = {
			List = {}
		}
		options = {
			#sitemap_name = coll_list.xml	# 
		}
	}
}
